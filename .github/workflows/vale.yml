---
name: vale
'on': [pull_request, push]
jobs:
  vale:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install asciidoctor
      - uses: vale-cli/vale-action@v2.1.1
        with:
          fail_on_error: true
