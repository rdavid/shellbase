---
name: actionlint
'on':
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - id: get
        run: |
          srv=https://raw.githubusercontent.com/rhysd/actionlint
          ver=1.7.12
          curl --fail --location --silent --show-error \
            "$srv/v$ver/scripts/download-actionlint.bash" | bash -s -- "$ver"
      - run: ${{ steps.get.outputs.executable }}
