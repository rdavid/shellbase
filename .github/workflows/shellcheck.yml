---
'on': [pull_request, push]
name: shellcheck
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: ./*.do ./app/* ./lib/*
