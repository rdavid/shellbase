---
'on':
  pull_request:
  push:
    branches: [master]
name: shellcheck
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: ./*.do ./app/* ./lib/*
