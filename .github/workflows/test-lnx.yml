---
name: test-lnx
'on':
  pull_request:
    paths: &paths
      - '*.do'
      - app/**
      - lib/**
      - container/**
  push:
    branches: [master]
    paths: *paths
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: sh
jobs:
  test-lnx:
    name: Test ${{ matrix.img }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        img:
          - alpine
          - archlinux
          - debian
          - fedora
          - ubi8
          - ubi9
          # Temporary: skip ubi10.
          # - ubi10
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes podman
      - env:
          img: ${{ matrix.img }}
        run: |
          podman build \
            --file "./container/$img/Containerfile" \
            --format docker \
            --tag "$img:latest" \
            .
      - env:
          img: ${{ matrix.img }}
        run: |
          podman run --rm "$img:latest" lint test
