---
name: test-bsd
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-bsd:
    name: Test BSD on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: vmactions/freebsd-vm@v1.4.6
        with:
          prepare: |
            pkg update
            pkg install -y \
              bash \
              curl \
              goredo \
              p5-Digest-SHA
            cd /usr/local/bin
            goredo -symlinks
            cd -
            ln -s /usr/local/bin/bash /bin/bash
          run: |
            redo -xx lint test
